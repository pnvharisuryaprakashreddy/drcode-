<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light; }
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #111111;
        margin: 0;
        padding: 0;
      }
      .page {
        padding: 20px 18px;
      }
      .top {
        border-bottom: 2px solid #111;
        padding-bottom: 12px;
        margin-bottom: 14px;
      }
      .name { font-size: 22px; font-weight: 700; letter-spacing: 0.2px; }
      .contact { font-size: 11.5px; margin-top: 6px; line-height: 1.4; }
      .contact span { margin-right: 10px; }
      .section { margin-top: 12px; }
      .heading {
        font-size: 11.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
      }
      .summary { font-size: 12px; line-height: 1.5; }
      .section-row { display: flex; gap: 12px; margin: 4px 0; }
      .k { width: 120px; font-size: 11.5px; font-weight: 700; color: #111; }
      .v { flex: 1; font-size: 11.5px; }
      .block { margin-top: 8px; }
      .row { display: flex; justify-content: space-between; gap: 10px; }
      .company { font-size: 12px; font-weight: 700; }
      .duration { font-size: 11.5px; color: #222; white-space: nowrap; }
      .role { font-size: 11.8px; margin-top: 2px; font-weight: 600; }
      .bullets { margin: 6px 0 0 16px; padding: 0; }
      .bullets li { font-size: 11.6px; line-height: 1.45; margin: 2px 0; }
      .edu-row { display: flex; justify-content: space-between; gap: 10px; margin: 5px 0; }
      .degree { font-size: 11.6px; font-weight: 700; }
      .school { font-size: 11.6px; flex: 1; color: #222; }
      .year { font-size: 11.6px; white-space: nowrap; }
      .tech { font-size: 11.5px; margin-top: 4px; font-weight: 700; color: #222; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top">
        <div class="name">{{NAME}}</div>
        <div class="contact">
          {{EMAIL}}<span></span>{{PHONE}}<span></span>{{LINKEDIN}}<span></span>{{GITHUB}}
        </div>
      </div>

      <div class="section">
        <div class="heading">Summary</div>
        <div class="summary">{{SUMMARY}}</div>
      </div>

      <div class="section">
        <div class="heading">Skills</div>
        <div>{{SKILLS_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Experience</div>
        <div>{{EXPERIENCE_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Education</div>
        <div>{{EDUCATION_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Projects</div>
        <div>{{PROJECTS_HTML}}</div>
      </div>
    </div>
  </body>
</html>
