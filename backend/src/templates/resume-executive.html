<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #fff;
        color: #0b0b0b;
        margin: 0;
      }
      .page { padding: 18px 18px 16px 18px; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 14px;
        align-items: start;
      }
      .name { font-size: 28px; font-weight: 900; letter-spacing: 0.2px; }
      .contact {
        font-size: 11.5px;
        line-height: 1.45;
        padding-left: 10px;
        border-left: 2px solid #0b0b0b;
      }
      .section { margin-top: 12px; }
      .heading {
        font-size: 11.5px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        margin-bottom: 8px;
        border-top: 2px solid #0b0b0b;
        padding-top: 10px;
      }
      .summary { font-size: 12px; line-height: 1.6; }
      .section-row { display: flex; gap: 12px; margin: 3px 0; }
      .k { width: 130px; font-size: 11.4px; font-weight: 900; }
      .v { flex: 1; font-size: 11.4px; color: #111; line-height: 1.35; }
      .block { margin-top: 10px; }
      .row { display: flex; justify-content: space-between; gap: 10px; }
      .company { font-weight: 900; font-size: 12.2px; }
      .duration { font-size: 11.4px; color: #222; white-space: nowrap; }
      .role { font-size: 12px; font-weight: 700; margin-top: 2px; }
      .bullets { margin: 6px 0 0 18px; padding: 0; }
      .bullets li { font-size: 11.6px; line-height: 1.48; margin: 2px 0; }
      .edu-row { display: grid; grid-template-columns: 1fr 120px 70px; gap: 8px; align-items: baseline; margin-top: 5px; }
      .degree { font-size: 11.6px; font-weight: 900; }
      .school { font-size: 11.6px; color: #222; }
      .year { font-size: 11.6px; white-space: nowrap; }
      .tech { font-size: 11.4px; font-weight: 900; color: #222; margin-top: 4px; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="grid">
        <div>
          <div class="name">{{NAME}}</div>
        </div>
        <div class="contact">
          <div>{{EMAIL}}</div>
          <div>{{PHONE}}</div>
          <div>{{LINKEDIN}}</div>
          <div>{{GITHUB}}</div>
        </div>
      </div>

      <div class="section">
        <div class="heading">Executive Summary</div>
        <div class="summary">{{SUMMARY}}</div>
      </div>

      <div class="section">
        <div class="heading">Core Skills</div>
        <div>{{SKILLS_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Experience</div>
        <div>{{EXPERIENCE_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Education</div>
        <div>{{EDUCATION_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Selected Projects</div>
        <div>{{PROJECTS_HTML}}</div>
      </div>
    </div>
  </body>
</html>
