<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light; }
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #0b0b0b;
        margin: 0;
      }
      .page { padding: 22px 18px; }
      .rule { border-top: 2px solid #0b0b0b; margin: 10px 0 14px; }
      .top {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        align-items: start;
      }
      .name {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .contact {
        font-size: 11.7px;
        line-height: 1.45;
        text-align: right;
      }
      .contact span { margin-left: 10px; white-space: nowrap; }
      .section { margin-top: 12px; }
      .heading {
        font-size: 11.5px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        margin-bottom: 8px;
        border-left: 6px solid #111;
        padding-left: 10px;
      }
      .summary { font-size: 12.2px; line-height: 1.55; }
      .section-row { display: flex; gap: 12px; margin: 3px 0; }
      .k { width: 140px; font-size: 11.4px; font-weight: 800; }
      .v { flex: 1; font-size: 11.4px; line-height: 1.4; }
      .block { margin-top: 8px; }
      .row { display: flex; justify-content: space-between; gap: 10px; }
      .company { font-weight: 800; font-size: 12.2px; }
      .duration { font-size: 11.3px; color: #222; white-space: nowrap; }
      .role { margin-top: 2px; font-size: 12px; font-weight: 600; }
      .bullets { margin: 6px 0 0 18px; padding: 0; }
      .bullets li { font-size: 11.6px; line-height: 1.48; margin: 2px 0; }
      .edu-row { display: flex; justify-content: space-between; gap: 10px; margin: 5px 0; }
      .degree { font-size: 11.7px; font-weight: 800; }
      .school { flex: 1; font-size: 11.7px; color: #222; }
      .year { font-size: 11.7px; white-space: nowrap; }
      .tech { font-size: 11.5px; font-weight: 800; color: #222; margin-top: 4px; }
      .tech .chip { display: inline-block; margin-right: 8px; }
      .proj-row { margin-top: 2px; }
      .muted { color: #222; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top">
        <div>
          <div class="name">{{NAME}}</div>
          <div class="rule"></div>
        </div>
        <div class="contact">
          <div>{{EMAIL}}</div>
          <div><span>{{PHONE}}</span><span>{{LINKEDIN}}</span><span>{{GITHUB}}</span></div>
        </div>
      </div>

      <div class="section">
        <div class="heading">Professional Summary</div>
        <div class="summary">{{SUMMARY}}</div>
      </div>

      <div class="section">
        <div class="heading">Skills</div>
        <div>{{SKILLS_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Experience</div>
        <div>{{EXPERIENCE_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Education</div>
        <div>{{EDUCATION_HTML}}</div>
      </div>

      <div class="section">
        <div class="heading">Projects</div>
        <div>{{PROJECTS_HTML}}</div>
      </div>
    </div>
  </body>
</html>
